<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280">
  <style>
    .bg   { fill: none; }
    .lyr  { stroke-width: 1.4; rx: 8; }
    .l-hw { fill: var(--svg-fill1,rgba(99,179,237,.16)); stroke: var(--svg-blue,#63b3ed); }
    .l-vm { fill: var(--svg-fill2,rgba(183,148,244,.14)); stroke: var(--svg-purple,#b794f4); }
    .l-os { fill: var(--svg-fill1,rgba(99,179,237,.12)); stroke: var(--svg-blue,#63b3ed); }
    .l-rt { fill: var(--svg-fill2,rgba(104,211,145,.12)); stroke: var(--svg-green,#68d391); }
    .l-app{ fill: var(--svg-fill1,rgba(246,173,85,.14)); stroke: var(--svg-amber,#f6ad55); }
    .l-dat{ fill: var(--svg-fill1,rgba(252,129,129,.12)); stroke: var(--svg-red,#fc8181); }
    /* bracket boxes */
    .br-i { fill: var(--svg-fill2,rgba(99,179,237,.08)); stroke: var(--svg-blue,#63b3ed); stroke-dasharray:5,3; }
    .br-p { fill: var(--svg-fill2,rgba(104,211,145,.07)); stroke: var(--svg-green,#68d391); stroke-dasharray:5,3; }
    .br-s { fill: var(--svg-fill2,rgba(246,173,85,.07)); stroke: var(--svg-amber,#f6ad55); stroke-dasharray:5,3; }
    /* text */
    .t1  { fill: var(--svg-text1,#d0e4f8); font-family: sans-serif; font-size: 13px; font-weight: 700; }
    .t2  { fill: var(--svg-text2,#6a9ab8); font-family: monospace; font-size: 9px; }
    .tbl { fill: var(--svg-blue,#63b3ed);   font-family: monospace; font-size: 10px; font-weight: 700; letter-spacing:.05em; }
    .tgn { fill: var(--svg-green,#68d391);  font-family: monospace; font-size: 10px; font-weight: 700; letter-spacing:.05em; }
    .tam { fill: var(--svg-amber,#f6ad55);  font-family: monospace; font-size: 10px; font-weight: 700; letter-spacing:.05em; }
    .t-you { fill: var(--svg-text2,#6a9ab8); font-family: monospace; font-size: 8px; }
    .t-prov{ fill: var(--svg-green,#68d391); font-family: monospace; font-size: 8px; }
  </style>

  <!-- Layer stack -->
  <!-- Data / App (top = user-facing) -->
  <rect x="10" y="14"  width="270" height="30" rx="6" class="l-dat lyr"/>
  <text x="145" y="34" class="t1" text-anchor="middle">Data &amp; Application</text>

  <rect x="10" y="50"  width="270" height="30" rx="6" class="l-app lyr"/>
  <text x="145" y="70" class="t1" text-anchor="middle">Application Runtime</text>

  <rect x="10" y="86"  width="270" height="30" rx="6" class="l-rt lyr"/>
  <text x="145" y="106" class="t1" text-anchor="middle">Middleware / Frameworks</text>

  <rect x="10" y="122" width="270" height="30" rx="6" class="l-os lyr"/>
  <text x="145" y="142" class="t1" text-anchor="middle">Operating System</text>

  <rect x="10" y="158" width="270" height="30" rx="6" class="l-vm lyr"/>
  <text x="145" y="178" class="t1" text-anchor="middle">Virtualisation / Hypervisor</text>

  <rect x="10" y="194" width="270" height="30" rx="6" class="l-hw lyr"/>
  <text x="145" y="214" class="t1" text-anchor="middle">Servers · Storage · Network</text>

  <rect x="10" y="230" width="270" height="30" rx="6" class="l-hw lyr"/>
  <text x="145" y="250" class="t1" text-anchor="middle">Physical Data Centre</text>

  <!-- Bracket: IaaS -->
  <rect x="288" y="122" width="54" height="138" rx="6" class="br-i" stroke-width="1.2"/>
  <text x="315" y="187" class="tbl" text-anchor="middle" transform="rotate(-90,315,187)">IaaS</text>
  <text x="315" y="268" class="t-prov" text-anchor="middle">Provider manages</text>

  <!-- Bracket: PaaS -->
  <rect x="348" y="50"  width="54" height="210" rx="6" class="br-p" stroke-width="1.2"/>
  <text x="375" y="151" class="tgn" text-anchor="middle" transform="rotate(-90,375,151)">PaaS</text>
  <text x="375" y="268" class="t-prov" text-anchor="middle">Provider manages</text>

  <!-- Bracket: SaaS -->
  <rect x="408" y="14"  width="54" height="246" rx="6" class="br-s" stroke-width="1.2"/>
  <text x="435" y="139" class="tam" text-anchor="middle" transform="rotate(-90,435,139)">SaaS</text>
  <text x="435" y="268" class="t-prov" text-anchor="middle">Provider manages</text>

  <!-- YOU manage markers -->
  <text x="145" y="275" class="t-you" text-anchor="middle">← You manage top layers →</text>
</svg>
