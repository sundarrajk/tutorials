<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260">
  <style>
    .bg   { fill:none; }
    .idp  { fill:var(--svg-fill1,rgba(246,173,85,.12)); stroke:var(--svg-amber,#f6ad55); stroke-width:1.8; }
    .team { fill:var(--svg-fill2,rgba(99,179,237,.10)); stroke:var(--svg-blue,#63b3ed); stroke-width:1.2; }
    .svc  { fill:var(--svg-fill2,rgba(104,211,145,.10));stroke:var(--svg-green,#68d391);stroke-width:1; }
    .plat { fill:var(--svg-fill2,rgba(183,148,244,.10));stroke:var(--svg-purple,#b794f4);stroke-width:1; }
    .infra{ fill:var(--svg-fill2,rgba(252,129,129,.10));stroke:var(--svg-red,#fc8181); stroke-width:1; }
    .arr  { fill:var(--svg-text2,rgba(99,179,237,.5)); }
    .con  { stroke:var(--svg-text2,rgba(99,179,237,.4)); fill:none; stroke-width:1.3; }
    .con-g{ stroke:var(--svg-green,rgba(104,211,145,.45)); fill:none; stroke-width:1.3; }
    .h-idp{ fill:var(--svg-amber,#f6ad55);  font-family:monospace; font-size:11px; font-weight:700; text-anchor:middle; }
    .h-t  { fill:var(--svg-blue,#63b3ed);   font-family:monospace; font-size:9px;  font-weight:700; text-anchor:middle; }
    .h-s  { fill:var(--svg-green,#68d391);  font-family:monospace; font-size:8.5px;font-weight:700; text-anchor:middle; }
    .h-p  { fill:var(--svg-purple,#b794f4); font-family:monospace; font-size:8.5px;font-weight:700; text-anchor:middle; }
    .h-i  { fill:var(--svg-red,#fc8181);    font-family:monospace; font-size:8.5px;font-weight:700; text-anchor:middle; }
    .sub  { fill:var(--svg-text2,#6a9ab8);  font-family:monospace; font-size:7.5px; text-anchor:middle; }
    .gain { fill:var(--svg-green,rgba(104,211,145,.75)); font-family:monospace; font-size:8px; }
    .pain { fill:var(--svg-red,rgba(252,129,129,.7));    font-family:monospace; font-size:8px; }
    .vs   { fill:var(--svg-amber,rgba(246,173,85,.6));   font-family:monospace; font-size:9px; font-weight:700; text-anchor:middle; }
  </style>
  <defs>
    <marker id="idpA" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" class="arr"/>
    </marker>
    <marker id="idpG" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="var(--svg-green,rgba(104,211,145,.55))"/>
    </marker>
  </defs>

  <!-- Developer teams on left -->
  <rect x="6"   y="20"  width="110" height="46" rx="6" class="team"/>
  <text x="61"  y="39"  class="h-t">🧑‍💻 Team: Payments</text>
  <text x="61"  y="52"  class="sub">Go · Postgres · k8s</text>

  <rect x="6"   y="76"  width="110" height="46" rx="6" class="team"/>
  <text x="61"  y="95"  class="h-t">🧑‍💻 Team: Accounts</text>
  <text x="61"  y="108" class="sub">Java · MySQL · k8s</text>

  <rect x="6"   y="132" width="110" height="46" rx="6" class="team"/>
  <text x="61"  y="151" class="h-t">🧑‍💻 Team: KYC</text>
  <text x="61"  y="164" class="sub">Python · Mongo · k8s</text>

  <rect x="6"   y="188" width="110" height="46" rx="6" class="team"/>
  <text x="61"  y="207" class="h-t">🧑‍💻 Team: Loans</text>
  <text x="61"  y="220" class="sub">.NET · Oracle · k8s</text>

  <!-- Arrows into IDP -->
  <line x1="118" y1="43"  x2="160" y2="80"  class="con" marker-end="url(#idpA)"/>
  <line x1="118" y1="99"  x2="160" y2="108" class="con" marker-end="url(#idpA)"/>
  <line x1="118" y1="155" x2="160" y2="134" class="con" marker-end="url(#idpA)"/>
  <line x1="118" y1="211" x2="160" y2="160" class="con" marker-end="url(#idpA)"/>

  <!-- IDP Central Portal -->
  <rect x="162" y="60" width="280" height="140" rx="10" class="idp"/>
  <text x="302" y="80"  class="h-idp">⚡  INTERNAL DEVELOPER PLATFORM</text>
  <text x="302" y="93"  class="sub">Self-service portal — Backstage / Humanitec / Cortex</text>
  <line x1="174" y1="100" x2="430" y2="100" stroke="var(--svg-amber,rgba(246,173,85,.2))" stroke-width=".8" fill="none"/>

  <rect x="174" y="107" width="60" height="42" rx="4" fill="var(--svg-fill2,rgba(246,173,85,.1))" stroke="var(--svg-amber,rgba(246,173,85,.3))" stroke-width=".8"/>
  <text x="204" y="122" class="sub" font-weight="700">Golden</text>
  <text x="204" y="133" class="sub" font-weight="700">Paths</text>
  <text x="204" y="144" class="sub">templates</text>

  <rect x="242" y="107" width="60" height="42" rx="4" fill="var(--svg-fill2,rgba(246,173,85,.1))" stroke="var(--svg-amber,rgba(246,173,85,.3))" stroke-width=".8"/>
  <text x="272" y="122" class="sub" font-weight="700">GitOps</text>
  <text x="272" y="133" class="sub" font-weight="700">Deploy</text>
  <text x="272" y="144" class="sub">ArgoCD</text>

  <rect x="310" y="107" width="60" height="42" rx="4" fill="var(--svg-fill2,rgba(246,173,85,.1))" stroke="var(--svg-amber,rgba(246,173,85,.3))" stroke-width=".8"/>
  <text x="340" y="122" class="sub" font-weight="700">Observ-</text>
  <text x="340" y="133" class="sub" font-weight="700">ability</text>
  <text x="340" y="144" class="sub">dashboards</text>

  <rect x="378" y="107" width="56" height="42" rx="4" fill="var(--svg-fill2,rgba(246,173,85,.1))" stroke="var(--svg-amber,rgba(246,173,85,.3))" stroke-width=".8"/>
  <text x="406" y="122" class="sub" font-weight="700">Security</text>
  <text x="406" y="133" class="sub" font-weight="700">Policies</text>
  <text x="406" y="144" class="sub">OPA gates</text>

  <text x="302" y="170" class="sub">Service catalogue · Cost attribution · Docs · Runbooks · SLO dashboards</text>
  <text x="302" y="182" class="sub">Dev requests environment → IDP provisions it in minutes, fully policy-compliant</text>

  <!-- Arrows out to underlying services -->
  <line x1="444" y1="100" x2="464" y2="60"  class="con-g" marker-end="url(#idpG)"/>
  <line x1="444" y1="120" x2="464" y2="100" class="con-g" marker-end="url(#idpG)"/>
  <line x1="444" y1="140" x2="464" y2="140" class="con-g" marker-end="url(#idpG)"/>
  <line x1="444" y1="160" x2="464" y2="185" class="con-g" marker-end="url(#idpG)"/>

  <!-- Underlying services right -->
  <rect x="466" y="28"  width="146" height="46" rx="6" class="svc"/>
  <text x="539" y="47"  class="h-s">CI/CD Pipelines</text>
  <text x="539" y="59"  class="sub">GitHub Actions · Tekton</text>

  <rect x="466" y="82"  width="146" height="46" rx="6" class="svc"/>
  <text x="539" y="101" class="h-s">Kubernetes Clusters</text>
  <text x="539" y="113" class="sub">EKS / AKS / GKE</text>

  <rect x="466" y="116" width="146" height="46" rx="6" class="plat"/>
  <text x="539" y="135" class="h-p">Secrets / Config</text>
  <text x="539" y="147" class="sub">Vault · K8s Secrets</text>

  <rect x="466" y="168" width="146" height="46" rx="6" class="infra"/>
  <text x="539" y="187" class="h-i">Infra as Code</text>
  <text x="539" y="199" class="sub">Terraform · Pulumi</text>

  <!-- Platform team -->
  <rect x="622" y="60"  width="132" height="154" rx="7" fill="var(--svg-fill2,rgba(183,148,244,.08))" stroke="var(--svg-purple,rgba(183,148,244,.3))" stroke-width="1"/>
  <text x="688" y="79"  class="h-p">PLATFORM</text>
  <text x="688" y="91"  class="h-p">TEAM</text>
  <line x1="630" y1="98" x2="748" y2="98" stroke="var(--svg-purple,rgba(183,148,244,.15))" stroke-width=".7" fill="none"/>
  <text x="688" y="110" class="sub">Maintains IDP</text>
  <text x="688" y="122" class="sub">Owns golden paths</text>
  <text x="688" y="134" class="sub">Security policies</text>
  <text x="688" y="146" class="sub">Cost optimisation</text>
  <text x="688" y="158" class="sub">SRE practices</text>
  <text x="688" y="170" class="sub">Developer experience</text>
  <text x="688" y="186" class="sub">Reduce cognitive load</text>
  <text x="688" y="198" class="sub">for product teams</text>

  <!-- Outcomes -->
  <text x="6"   y="248" class="gain">✓ Developers self-serve infra in minutes — no ops ticket</text>
  <text x="6"   y="260" class="gain">✓ Security and compliance baked into every golden path</text>
  <text x="360" y="248" class="gain">✓ Consistent tooling across 50+ microservice teams</text>
  <text x="360" y="260" class="gain">✓ Platform team = force multiplier, not bottleneck</text>
</svg>
