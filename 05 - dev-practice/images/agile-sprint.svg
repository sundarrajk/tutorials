<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260">
  <style>
    .sprint{ fill:var(--svg-fill1,rgba(104,211,145,.14)); stroke:var(--svg-green,#68d391); stroke-width:1.5; }
    .step  { fill:var(--svg-fill2,rgba(104,211,145,.08)); stroke:var(--svg-green,rgba(104,211,145,.4)); stroke-width:1; }
    .art   { fill:var(--svg-fill1,rgba(99,179,237,.14));  stroke:var(--svg-blue,#63b3ed);  stroke-width:1; }
    .back  { fill:var(--svg-fill1,rgba(183,148,244,.12)); stroke:var(--svg-purple,#b794f4); stroke-width:1; }
    .cust  { fill:var(--svg-fill1,rgba(246,173,85,.12));  stroke:var(--svg-amber,#f6ad55); stroke-width:1; }
    .arr   { fill:var(--svg-green,rgba(104,211,145,.6)); }
    .con   { stroke:var(--svg-green,rgba(104,211,145,.45)); fill:none; stroke-width:1.4; }
    .con2  { stroke:var(--svg-amber,rgba(246,173,85,.45)); fill:none; stroke-width:1.2; stroke-dasharray:4,3; }
    .h-sp  { fill:var(--svg-green,#68d391);  font-family:monospace; font-size:10px; font-weight:700; text-anchor:middle; }
    .h-art { fill:var(--svg-blue,#63b3ed);   font-family:monospace; font-size:9.5px; font-weight:700; text-anchor:middle; }
    .h-back{ fill:var(--svg-purple,#b794f4); font-family:monospace; font-size:9.5px; font-weight:700; text-anchor:middle; }
    .h-cust{ fill:var(--svg-amber,#f6ad55);  font-family:monospace; font-size:9.5px; font-weight:700; text-anchor:middle; }
    .step-t{ fill:var(--svg-green,rgba(104,211,145,.85)); font-family:monospace; font-size:9px; font-weight:700; text-anchor:middle; }
    .step-s{ fill:var(--svg-text2,#6a9ab8); font-family:monospace; font-size:7.5px; text-anchor:middle; }
    .gain  { fill:var(--svg-green,rgba(104,211,145,.7)); font-family:monospace; font-size:8px; }
    .pain  { fill:var(--svg-red,rgba(252,129,129,.7));   font-family:monospace; font-size:8px; }
    .val   { fill:var(--svg-purple,rgba(183,148,244,.75)); font-family:monospace; font-size:8px; }
  </style>
  <defs>
    <marker id="spArr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" class="arr"/>
    </marker>
  </defs>

  <!-- Product Backlog -->
  <rect x="6" y="30" width="110" height="192" rx="7" class="back"/>
  <text x="61" y="50"  class="h-back">PRODUCT</text>
  <text x="61" y="63"  class="h-back">BACKLOG</text>
  <line x1="14" y1="70" x2="108" y2="70" stroke="var(--svg-purple,rgba(183,148,244,.2))" stroke-width=".7" fill="none"/>
  <rect x="14" y="76"  width="94" height="14" rx="3" fill="var(--svg-purple,rgba(183,148,244,.2))" stroke="none"/>
  <text x="61" y="86"  class="val" text-anchor="middle">Epic / User Stories</text>
  <rect x="14" y="93"  width="94" height="10" rx="2" fill="var(--svg-purple,rgba(183,148,244,.12))" stroke="none"/>
  <text x="61" y="101" class="val" text-anchor="middle">As a user I want...</text>
  <rect x="14" y="106" width="94" height="10" rx="2" fill="var(--svg-purple,rgba(183,148,244,.12))" stroke="none"/>
  <text x="61" y="114" class="val" text-anchor="middle">Acceptance criteria</text>
  <rect x="14" y="119" width="94" height="10" rx="2" fill="var(--svg-purple,rgba(183,148,244,.08))" stroke="none"/>
  <text x="61" y="127" class="val" text-anchor="middle">Story points / priority</text>
  <rect x="14" y="132" width="94" height="10" rx="2" fill="var(--svg-purple,rgba(183,148,244,.06))" stroke="none"/>
  <rect x="14" y="145" width="94" height="10" rx="2" fill="var(--svg-purple,rgba(183,148,244,.04))" stroke="none"/>
  <rect x="14" y="158" width="94" height="10" rx="2" fill="var(--svg-purple,rgba(183,148,244,.03))" stroke="none"/>
  <rect x="14" y="171" width="94" height="10" rx="2" fill="var(--svg-purple,rgba(183,148,244,.02))" stroke="none"/>
  <text x="61" y="200" class="step-s">Prioritised by Product Owner</text>

  <!-- Sprint planning arrow -->
  <line x1="119" y1="100" x2="137" y2="100" class="con" marker-end="url(#spArr)"/>
  <text x="128" y="93" fill="var(--svg-green,rgba(104,211,145,.5))" font-family="monospace" font-size="7" text-anchor="middle">plan</text>

  <!-- Sprint Box -->
  <rect x="140" y="14" width="280" height="228" rx="9" class="sprint"/>
  <text x="280" y="35" class="h-sp">SPRINT  (1–2 weeks)</text>
  <line x1="154" y1="42" x2="406" y2="42" stroke="var(--svg-green,rgba(104,211,145,.2))" stroke-width=".8" fill="none"/>

  <!-- Sprint steps -->
  <rect x="152" y="48" width="116" height="36" rx="5" class="step"/>
  <text x="210" y="63"  class="step-t">PLAN</text>
  <text x="210" y="76"  class="step-s">Pull stories from backlog</text>
  <line x1="270" y1="66" x2="284" y2="66" class="con" marker-end="url(#spArr)"/>

  <rect x="286" y="48" width="116" height="36" rx="5" class="step"/>
  <text x="344" y="63"  class="step-t">DESIGN + BUILD</text>
  <text x="344" y="76"  class="step-s">Feature coding + unit tests</text>
  <line x1="270" y1="120" x2="284" y2="120" class="con" marker-end="url(#spArr)"/>

  <rect x="152" y="100" width="116" height="36" rx="5" class="step"/>
  <text x="210" y="115" class="step-t">TEST</text>
  <text x="210" y="128" class="step-s">Dev tests own code</text>
  <line x1="344" y1="86"  x2="344" y2="100" class="con" stroke-dasharray="none" marker-end="url(#spArr)"/>

  <rect x="286" y="100" width="116" height="36" rx="5" class="step"/>
  <text x="344" y="115" class="step-t">INTEGRATE</text>
  <text x="344" y="128" class="step-s">Merge to shared branch</text>

  <rect x="152" y="154" width="250" height="36" rx="5" class="step"/>
  <text x="277" y="169" class="step-t">SPRINT REVIEW + RETROSPECTIVE</text>
  <text x="277" y="182" class="step-s">Demo to stakeholders · What worked · What to improve</text>

  <line x1="210" y1="138" x2="210" y2="154" class="con" marker-end="url(#spArr)"/>
  <line x1="344" y1="138" x2="344" y2="154" class="con" marker-end="url(#spArr)"/>

  <!-- Sprint increment -->
  <rect x="152" y="198" width="250" height="36" rx="5" class="art"/>
  <text x="277" y="214" class="h-art">SPRINT INCREMENT</text>
  <text x="277" y="226" class="step-s">Working, tested software — every sprint, every time</text>

  <!-- Arrow to customer + back -->
  <line x1="422" y1="100" x2="440" y2="100" class="con" marker-end="url(#spArr)"/>
  <text x="431" y="93" fill="var(--svg-green,rgba(104,211,145,.5))" font-family="monospace" font-size="7" text-anchor="middle">ship</text>

  <!-- Customer -->
  <rect x="444" y="30" width="104" height="90" rx="7" class="cust"/>
  <text x="496" y="52"  class="h-cust">👤 CUSTOMER</text>
  <text x="496" y="66"  class="step-s">Reviews increment</text>
  <text x="496" y="78"  class="step-s">Validates stories</text>
  <text x="496" y="90"  class="step-s">New requirements</text>
  <text x="496" y="102" class="step-s">emerge → backlog</text>
  <!-- feedback arrow -->
  <path d="M 444 65 Q 424 40 410 40 Q 140 40 140 65" class="con2" marker-end="url(#spArr)"/>
  <text x="290" y="37" fill="var(--svg-amber,rgba(246,173,85,.55))" font-family="monospace" font-size="7.5" text-anchor="middle">continuous customer feedback</text>

  <!-- What Agile fixed vs what remained -->
  <rect x="444" y="134" width="190" height="108" rx="7" fill="var(--svg-fill2,rgba(104,211,145,.05))" stroke="var(--svg-green,rgba(104,211,145,.2))" stroke-width=".8"/>
  <text x="452" y="150" class="gain" font-weight="700">WHAT AGILE FIXED</text>
  <text x="452" y="163" class="gain">✓ No more 18-month surprises</text>
  <text x="452" y="176" class="gain">✓ Customer sees software early</text>
  <text x="452" y="189" class="gain">✓ Change is expected, not feared</text>
  <text x="452" y="202" class="gain">✓ Cross-functional teams</text>
  <text x="452" y="215" class="pain">✗ Deploy still manual / infrequent</text>
  <text x="452" y="228" class="pain">✗ Dev and Ops still separate teams</text>
  <text x="452" y="241" class="pain">✗ No automation in pipeline</text>
</svg>
