<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380">
  <style>
    .bg   { fill: var(--svg-bg,#0d1117); }
    .col  { fill: var(--svg-card,#1a2235); stroke-width: 1.5; }
    .c1   { stroke: var(--svg-blue,#58a6ff); }
    .c2   { stroke: var(--svg-accent,#f0a500); }
    .c3   { stroke: var(--svg-green,#3fb950); }
    .plat { fill: var(--svg-fill1,rgba(240,165,0,0.1)); stroke: var(--svg-accent,#f0a500); stroke-width: 1.5; }
    .row  { fill: var(--svg-fill2,rgba(99,179,237,0.07)); stroke: var(--svg-blue,#58a6ff); stroke-width: .7; }
    .row-g{ fill: var(--svg-fill2,rgba(63,185,80,0.07)); stroke: var(--svg-green,#3fb950); stroke-width: .7; }
    .row-a{ fill: var(--svg-fill2,rgba(240,165,0,0.07)); stroke: var(--svg-accent,#f0a500); stroke-width: .7; }
    .tit  { font-family:monospace; font-size:14px; font-weight:700; text-anchor:middle; }
    .t1   { fill: var(--svg-blue,#58a6ff); }
    .t2   { fill: var(--svg-accent,#f0a500); }
    .t3   { fill: var(--svg-green,#3fb950); }
    .sub  { fill: var(--svg-text2,#8b949e); font-family:monospace; font-size:12px; text-anchor:middle; }
    .item { fill: var(--svg-text,#e6edf3); font-family:monospace; font-size:12px; }
    .plat-t{ fill: var(--svg-accent,#f0a500); font-family:monospace; font-size:13px; font-weight:700; text-anchor:middle; }
    .plat-s{ fill: var(--svg-text2,#8b949e); font-family:monospace; font-size:12px; text-anchor:middle; }
    .conn { stroke: var(--svg-text2,#8b949e); stroke-width: 1; stroke-dasharray:3,2; fill:none; opacity:.5; }
    .arr  { fill: var(--svg-text2,#8b949e); opacity:.5; }
    .head { fill: var(--svg-text2,#8b949e); font-family:monospace; font-size:12px; letter-spacing:1px; text-transform:uppercase; text-anchor:middle; }
  </style>
  <defs>
    <marker id="aOb" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3z" class="arr"/>
    </marker>
  </defs>

  <rect class="bg" width="680" height="380"/>
  <text class="head" x="340" y="18">Three Pillars of Observability</text>

  <!-- Column widths: each 192px, gap 16px, start x=12 -->

  <!-- Metrics column -->
  <rect class="col c1" x="12"  y="30" width="200" height="240" rx="8"/>
  <text class="tit t1" x="112" y="54">Metrics</text>
  <text class="sub"    x="112" y="70">Counts &amp; Latencies</text>

  <rect class="row"   x="22" y="80" width="180" height="26" rx="4"/>
  <text class="item"  x="30" y="97">Request counts / sec</text>
  <rect class="row"   x="22" y="112" width="180" height="26" rx="4"/>
  <text class="item"  x="30" y="129">Response latency (p50/p99)</text>
  <rect class="row"   x="22" y="144" width="180" height="26" rx="4"/>
  <text class="item"  x="30" y="161">Error rates per service</text>
  <rect class="row"   x="22" y="176" width="180" height="26" rx="4"/>
  <text class="item"  x="30" y="193">CPU / Memory usage</text>
  <rect class="row"   x="22" y="208" width="180" height="26" rx="4"/>
  <text class="item"  x="30" y="225">Queue depths</text>

  <text class="sub"   x="112" y="256">Provided by Kubernetes</text>
  <text class="sub"   x="112" y="270">+ Prometheus</text>

  <!-- Traces column -->
  <rect class="col c2" x="240" y="30" width="200" height="240" rx="8"/>
  <text class="tit t2" x="340" y="54">Traces</text>
  <text class="sub"    x="340" y="70">Request Flow Across Services</text>

  <rect class="row-a" x="250" y="80" width="180" height="26" rx="4"/>
  <text class="item"  x="258" y="97">Trace ID follows each request</text>
  <rect class="row-a" x="250" y="112" width="180" height="26" rx="4"/>
  <text class="item"  x="258" y="129">Span per service hop</text>
  <rect class="row-a" x="250" y="144" width="180" height="26" rx="4"/>
  <text class="item"  x="258" y="161">Latency per span visible</text>
  <rect class="row-a" x="250" y="176" width="180" height="26" rx="4"/>
  <text class="item"  x="258" y="193">Identifies slow service</text>
  <rect class="row-a" x="250" y="208" width="180" height="26" rx="4"/>
  <text class="item"  x="258" y="225">Jaeger / Zipkin / Tempo</text>

  <text class="sub"   x="340" y="256">Kubernetes sidecar</text>
  <text class="sub"   x="340" y="270">+ Application (trace headers)</text>

  <!-- Logs column -->
  <rect class="col c3" x="468" y="30" width="200" height="240" rx="8"/>
  <text class="tit t3" x="568" y="54">Logs</text>
  <text class="sub"    x="568" y="70">What Exactly Went Wrong</text>

  <rect class="row-g" x="478" y="80" width="180" height="26" rx="4"/>
  <text class="item"  x="486" y="97">Structured JSON logs</text>
  <rect class="row-g" x="478" y="112" width="180" height="26" rx="4"/>
  <text class="item"  x="486" y="129">Log level: ERROR / WARN</text>
  <rect class="row-g" x="478" y="144" width="180" height="26" rx="4"/>
  <text class="item"  x="486" y="161">Stack traces on exceptions</text>
  <rect class="row-g" x="478" y="176" width="180" height="26" rx="4"/>
  <text class="item"  x="486" y="193">Correlation with Trace ID</text>
  <rect class="row-g" x="478" y="208" width="180" height="26" rx="4"/>
  <text class="item"  x="486" y="225">ELK / Loki / CloudWatch</text>

  <text class="sub"   x="568" y="256">Application responsibility</text>
  <text class="sub"   x="568" y="270">Aggregated centrally</text>

  <!-- Aggregation platform -->
  <rect class="plat" x="80" y="296" width="520" height="60" rx="8"/>
  <text class="plat-t" x="340" y="318">Observability Platform</text>
  <text class="plat-s" x="340" y="336">Prometheus + Grafana · Jaeger · ELK / Loki — all dashboards in one place</text>
  <text class="plat-s" x="340" y="352">Alerts fire when SLOs breached · On-call engineers get paged</text>

  <!-- Arrows from columns into platform -->
  <line class="conn" x1="112" y1="270" x2="200" y2="296" marker-end="url(#aOb)"/>
  <line class="conn" x1="340" y1="270" x2="340" y2="296" marker-end="url(#aOb)"/>
  <line class="conn" x1="568" y1="270" x2="480" y2="296" marker-end="url(#aOb)"/>
</svg>
