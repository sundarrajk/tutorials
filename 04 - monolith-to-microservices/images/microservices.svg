<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 500">
  <style>
    .bg    { fill: var(--svg-bg,#0d1117); }
    .svc   { fill: var(--svg-card,#1a2235); stroke-width: 1.5; rx:6; }
    .s1 { stroke: var(--svg-blue,#58a6ff); }
    .s2 { stroke: var(--svg-green,#3fb950); }
    .s3 { stroke: var(--svg-accent,#f0a500); }
    .s4 { stroke: #b794f4; }
    .s5 { stroke: #fc8181; }
    .s6 { stroke: #63b3ed; }
    .s7 { stroke: #f6ad55; }
    .s8 { stroke: #68d391; }
    .db    { fill: var(--svg-card,#1a2235); stroke-width: 1.2; }
    .gw    { fill: var(--svg-fill1,rgba(240,165,0,0.1)); stroke: var(--svg-accent,#f0a500); stroke-width: 2; }
    .api   { fill: var(--svg-accent,#f0a500); font-family: monospace; font-size:13px; font-weight:700; text-anchor:middle; }
    .svc-t { fill: var(--svg-text,#e6edf3); font-family: monospace; font-size:12px; font-weight:700; text-anchor:middle; }
    .svc-s { fill: var(--svg-text2,#8b949e); font-family: monospace; font-size:11px; text-anchor:middle; }
    .db-t  { font-family: monospace; font-size:11px; text-anchor:middle; }
    .tit   { fill: var(--svg-text2,#8b949e); font-family: monospace; font-size:12px; letter-spacing:1px; text-transform:uppercase; text-anchor:middle; }
    .bc    { font-family: monospace; font-size:10px; letter-spacing:1px; text-transform:uppercase; text-anchor:middle; }
    .conn  { stroke-width: 1.2; fill:none; opacity:.6; }
    .arr   { opacity:.6; }
  </style>
  <defs>
    <marker id="aS1" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3z" fill="var(--svg-blue,#58a6ff)" class="arr"/></marker>
    <marker id="aS2" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3z" fill="var(--svg-green,#3fb950)" class="arr"/></marker>
    <marker id="aS3" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3z" fill="var(--svg-accent,#f0a500)" class="arr"/></marker>
    <marker id="aGW" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3z" fill="var(--svg-accent,#f0a500)"/></marker>
  </defs>

  <rect class="bg" width="740" height="500"/>
  <text class="tit" x="370" y="20">Domain-Driven Design — Bounded Context — Each Service Owns Its Domain</text>

  <!-- API Gateway -->
  <rect class="gw" x="270" y="30" width="200" height="46" rx="8"/>
  <text class="api" x="370" y="50">API Gateway</text>
  <text class="svc-s" x="370" y="66">Single entry point</text>

  <!-- Service boxes — 148×48, arranged in 4 columns × 2 rows -->
  <!-- Row 1: y=108, row 2: y=232 -->
  <!-- Col centres: 56, 204, 352, 500, 648 — but 5 services per row won't fit nicely -->
  <!-- Use 4 across top, 4 across bottom: col x starts 14,198,382,566 width 160 -->

  <!-- Row 1 -->
  <!-- Accounts svc -->
  <rect class="svc s1" x="14"  y="108" width="160" height="48" rx="6"/>
  <text class="svc-t" x="94"  y="128">Accounts Svc</text>
  <text class="svc-s" x="94"  y="144">Savings/Current/FD/RD</text>
  <rect class="db s1" x="34"  y="166" width="120" height="28" rx="4"/>
  <text class="db-t" x="94" y="184" fill="var(--svg-blue,#58a6ff)">accounts-db</text>

  <!-- Demat svc -->
  <rect class="svc s2" x="194" y="108" width="160" height="48" rx="6"/>
  <text class="svc-t" x="274" y="128">Demat Svc</text>
  <text class="svc-s" x="274" y="144">Securities Trading</text>
  <rect class="db s2" x="214" y="166" width="120" height="28" rx="4"/>
  <text class="db-t" x="274" y="184" fill="var(--svg-green,#3fb950)">demat-db</text>

  <!-- Loans svc -->
  <rect class="svc s3" x="374" y="108" width="160" height="48" rx="6"/>
  <text class="svc-t" x="454" y="128">Loans Svc</text>
  <text class="svc-s" x="454" y="144">Loan Mgmt (LMS)</text>
  <rect class="db s3" x="394" y="166" width="120" height="28" rx="4"/>
  <text class="db-t" x="454" y="184" fill="var(--svg-accent,#f0a500)">loans-db</text>

  <!-- KYC svc -->
  <rect class="svc s4" x="554" y="108" width="160" height="48" rx="6"/>
  <text class="svc-t" x="634" y="128">KYC Svc</text>
  <text class="svc-s" x="634" y="144">CRM System</text>
  <rect class="db s4" x="574" y="166" width="120" height="28" rx="4"/>
  <text class="db-t" x="634" y="184" fill="#b794f4">kyc-db</text>

  <!-- Row 2 -->
  <!-- Debit Card svc -->
  <rect class="svc s5" x="14"  y="242" width="160" height="48" rx="6"/>
  <text class="svc-t" x="94"  y="262">Debit Card Svc</text>
  <text class="svc-s" x="94"  y="278">Debit Card Mgmt</text>
  <rect class="db s5" x="34"  y="300" width="120" height="28" rx="4"/>
  <text class="db-t" x="94" y="318" fill="#fc8181">debit-db</text>

  <!-- Credit Card svc -->
  <rect class="svc s6" x="194" y="242" width="160" height="48" rx="6"/>
  <text class="svc-t" x="274" y="262">Credit Card Svc</text>
  <text class="svc-s" x="274" y="278">Credit Card Mgmt</text>
  <rect class="db s6" x="214" y="300" width="120" height="28" rx="4"/>
  <text class="db-t" x="274" y="318" fill="#63b3ed">credit-db</text>

  <!-- Payments svc -->
  <rect class="svc s7" x="374" y="242" width="160" height="48" rx="6"/>
  <text class="svc-t" x="454" y="262">Payments Svc</text>
  <text class="svc-s" x="454" y="278">UPI / Transfers</text>
  <rect class="db s7" x="394" y="300" width="120" height="28" rx="4"/>
  <text class="db-t" x="454" y="318" fill="#f6ad55">payments-db</text>

  <!-- FAQ svc -->
  <rect class="svc s8" x="554" y="242" width="160" height="48" rx="6"/>
  <text class="svc-t" x="634" y="262">FAQ Svc</text>
  <text class="svc-s" x="634" y="278">CMS</text>
  <rect class="db s8" x="574" y="300" width="120" height="28" rx="4"/>
  <text class="db-t" x="634" y="318" fill="#68d391">faq-db</text>

  <!-- Gateway → Services (vertical lines down from gateway bottom y=76) -->
  <line stroke="var(--svg-accent,#f0a500)" stroke-width="1.2" stroke-dasharray="4,3" fill="none" x1="370" y1="76" x2="94"  y2="108" marker-end="url(#aGW)"/>
  <line stroke="var(--svg-accent,#f0a500)" stroke-width="1.2" stroke-dasharray="4,3" fill="none" x1="370" y1="76" x2="274" y2="108" marker-end="url(#aGW)"/>
  <line stroke="var(--svg-accent,#f0a500)" stroke-width="1.2" stroke-dasharray="4,3" fill="none" x1="370" y1="76" x2="454" y2="108" marker-end="url(#aGW)"/>
  <line stroke="var(--svg-accent,#f0a500)" stroke-width="1.2" stroke-dasharray="4,3" fill="none" x1="370" y1="76" x2="634" y2="108" marker-end="url(#aGW)"/>
  <line stroke="var(--svg-accent,#f0a500)" stroke-width="1.2" stroke-dasharray="4,3" fill="none" x1="370" y1="76" x2="94"  y2="242" marker-end="url(#aGW)"/>
  <line stroke="var(--svg-accent,#f0a500)" stroke-width="1.2" stroke-dasharray="4,3" fill="none" x1="370" y1="76" x2="274" y2="242" marker-end="url(#aGW)"/>
  <line stroke="var(--svg-accent,#f0a500)" stroke-width="1.2" stroke-dasharray="4,3" fill="none" x1="370" y1="76" x2="454" y2="242" marker-end="url(#aGW)"/>
  <line stroke="var(--svg-accent,#f0a500)" stroke-width="1.2" stroke-dasharray="4,3" fill="none" x1="370" y1="76" x2="634" y2="242" marker-end="url(#aGW)"/>

  <!-- Bounded context labels -->
  <text class="bc" x="94"  y="356" fill="var(--svg-blue,#58a6ff)">Bounded Context</text>
  <text class="bc" x="94"  y="370" fill="var(--svg-blue,#58a6ff)">owns its DB</text>
  <text class="bc" x="454" y="356" fill="var(--svg-accent,#f0a500)">Service-to-service</text>
  <text class="bc" x="454" y="370" fill="var(--svg-accent,#f0a500)">via API only</text>

  <!-- Inter-service arrows (Payments → Accounts, Payments → Cards) -->
  <line stroke="#f6ad55" stroke-width="1" stroke-dasharray="3,2" fill="none" x1="374" y1="270" x2="174" y2="270" marker-end="url(#aS3)"/>
  <line stroke="#f6ad55" stroke-width="1" stroke-dasharray="3,2" fill="none" x1="394" y1="280" x2="354" y2="280" marker-end="url(#aS3)"/>

  <text class="tit" x="370" y="460">Each service deploys independently · No shared database · Clear domain ownership</text>
</svg>
