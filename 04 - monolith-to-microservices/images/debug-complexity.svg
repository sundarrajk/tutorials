<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400">
  <style>
    .bg   { fill: var(--svg-bg,#0d1117); }
    .svc  { fill: var(--svg-card,#1a2235); stroke-width: 1.2; }
    .s1 { stroke: var(--svg-blue,#58a6ff); }
    .s2 { stroke: var(--svg-green,#3fb950); }
    .s3 { stroke: var(--svg-accent,#f0a500); }
    .s4 { stroke: #b794f4; }
    .s5 { stroke: #fc8181; }
    .s6 { stroke: #63b3ed; }
    .s7 { stroke: #f6ad55; }
    .s8 { stroke: #68d391; }
    .log  { fill: var(--svg-fill2,rgba(240,165,0,0.07)); stroke: var(--svg-accent,#f0a500); stroke-width:.7; stroke-dasharray:3,2; }
    .req  { stroke: var(--svg-accent,#f0a500); stroke-width:1.2; fill:none; opacity:.7; }
    .err  { stroke: var(--svg-red,#f85149); stroke-width:2; fill:none; opacity:.85; }
    .svc-t{ fill: var(--svg-text,#e6edf3); font-family:monospace; font-size:11px; font-weight:700; text-anchor:middle; }
    .log-t{ fill: var(--svg-accent,#f0a500); font-family:monospace; font-size:10px; }
    .q    { fill: var(--svg-red,#f85149); font-family:monospace; font-size:12px; font-weight:700; text-anchor:middle; }
    .head { fill: var(--svg-text2,#8b949e); font-family:monospace; font-size:12px; letter-spacing:1px; text-transform:uppercase; text-anchor:middle; }
    .note { fill: var(--svg-text2,#8b949e); font-family:monospace; font-size:11px; text-anchor:middle; }
    .arr  { fill: var(--svg-accent,#f0a500); opacity:.7; }
    .err-a{ fill: var(--svg-red,#f85149); opacity:.85; }
    .user { fill: var(--svg-fill1,rgba(88,166,255,0.15)); stroke: var(--svg-blue,#58a6ff); stroke-width: 1.2; }
    .usr-t{ fill: var(--svg-blue,#58a6ff); font-family:monospace; font-size:12px; font-weight:700; text-anchor:middle; }
  </style>
  <defs>
    <marker id="aR" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3z" class="arr"/></marker>
    <marker id="aE" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3z" class="err-a"/></marker>
  </defs>

  <rect class="bg" width="700" height="400"/>
  <text class="head" x="350" y="18">Debugging in Microservices — The Challenge</text>

  <!-- User -->
  <rect class="user" x="300" y="28" width="100" height="36" rx="6"/>
  <text class="usr-t" x="350" y="50">USER</text>

  <!-- Services row 1 — y=96 -->
  <rect class="svc s1" x="12"  y="96" width="110" height="40" rx="5"/>
  <text class="svc-t" x="67"  y="121">accounts-svc</text>

  <rect class="svc s2" x="140" y="96" width="110" height="40" rx="5"/>
  <text class="svc-t" x="195" y="121">demat-svc</text>

  <rect class="svc s3" x="268" y="96" width="110" height="40" rx="5"/>
  <text class="svc-t" x="323" y="121">loans-svc</text>

  <rect class="svc s4" x="396" y="96" width="110" height="40" rx="5"/>
  <text class="svc-t" x="451" y="121">kyc-svc</text>

  <rect class="svc s5" x="524" y="96" width="110" height="40" rx="5"/>
  <text class="svc-t" x="579" y="121">debit-card</text>

  <!-- Services row 2 — y=170 -->
  <rect class="svc s6" x="76"  y="170" width="110" height="40" rx="5"/>
  <text class="svc-t" x="131" y="195">credit-card</text>

  <!-- Payments — error marker -->
  <rect fill="rgba(248,81,73,0.15)" stroke="var(--svg-red,#f85149)" stroke-width="2" x="244" y="170" width="110" height="40" rx="5"/>
  <text class="svc-t" x="299" y="195">payments-svc</text>
  <text class="q"     x="299" y="212">⚠ ERROR</text>

  <rect class="svc s8" x="412" y="170" width="110" height="40" rx="5"/>
  <text class="svc-t" x="467" y="195">faq-svc</text>

  <!-- Request flow arrows -->
  <line stroke="var(--svg-accent,#f0a500)" stroke-width="1.2" stroke-dasharray="3,2" fill="none" x1="350" y1="64" x2="323" y2="96" marker-end="url(#aR)"/>
  <line stroke="var(--svg-accent,#f0a500)" stroke-width="1.2" stroke-dasharray="3,2" fill="none" x1="323" y1="136" x2="299" y2="170" marker-end="url(#aR)"/>
  <line stroke="var(--svg-accent,#f0a500)" stroke-width="1.2" stroke-dasharray="3,2" fill="none" x1="323" y1="136" x2="67"  y2="96"  marker-end="url(#aR)"/>
  <line stroke="var(--svg-accent,#f0a500)" stroke-width="1.2" stroke-dasharray="3,2" fill="none" x1="299" y1="170" x2="131" y2="170" marker-end="url(#aR)"/>

  <!-- Error bubbles back -->
  <line stroke="var(--svg-red,#f85149)" stroke-width="2" fill="none" x1="299" y1="170" x2="323" y2="136" marker-end="url(#aE)"/>
  <line stroke="var(--svg-red,#f85149)" stroke-width="2" fill="none" x1="323" y1="96"  x2="350" y2="64"  marker-end="url(#aE)"/>

  <!-- Log file boxes per service — scattered, illustrating complexity -->
  <rect class="log" x="12"  y="238" width="96" height="28" rx="3"/>
  <text class="log-t" x="16" y="256">accounts.log</text>
  <rect class="log" x="140" y="248" width="96" height="28" rx="3"/>
  <text class="log-t" x="144" y="266">demat.log</text>
  <rect class="log" x="268" y="234" width="96" height="28" rx="3"/>
  <text class="log-t" x="272" y="252">loans.log</text>
  <rect class="log" x="396" y="244" width="96" height="28" rx="3"/>
  <text class="log-t" x="400" y="262">kyc.log</text>
  <rect class="log" x="524" y="238" width="96" height="28" rx="3"/>
  <text class="log-t" x="528" y="256">debit.log</text>
  <rect class="log" x="76"  y="284" width="96" height="28" rx="3"/>
  <text class="log-t" x="80" y="302">credit.log</text>
  <rect class="log" x="244" y="276" width="104" height="28" rx="3"/>
  <text class="log-t" x="248" y="294">payments.log ⚠</text>
  <rect class="log" x="412" y="284" width="96" height="28" rx="3"/>
  <text class="log-t" x="416" y="302">faq.log</text>

  <!-- Question labels -->
  <text class="q" x="350" y="338">Which log? Which instance? Which service caused it?</text>
  <text class="note" x="350" y="358">Each pod generates its own log · Requests span many services · No single place to look</text>
  <text class="note" x="350" y="376">Solution: Centralised observability — Metrics + Traces + Logs aggregated</text>
</svg>
