<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420">
  <style>
    .bg    { fill: var(--svg-bg,#0d1117); }
    .mono  { fill: var(--svg-card,#1a2235); stroke: var(--svg-accent,#f0a500); stroke-width: 2; }
    .be    { fill: var(--svg-card,#1a2235); stroke: var(--svg-blue,#58a6ff); stroke-width: 1.5; }
    .db    { fill: var(--svg-card,#1a2235); stroke: var(--svg-green,#3fb950); stroke-width: 1.5; }
    .conn  { stroke: var(--svg-accent,#f0a500); stroke-width: 1.2; stroke-dasharray:4,3; fill:none; opacity:.7; }
    .conn-b{ stroke: var(--svg-blue,#58a6ff); stroke-width: 1.2; stroke-dasharray:4,3; fill:none; opacity:.6; }
    .tit   { fill: var(--svg-accent,#f0a500); font-family: monospace; font-size:14px; font-weight:700; text-anchor:middle; }
    .sub   { fill: var(--svg-text2,#8b949e); font-family: monospace; font-size:11px; text-anchor:middle; }
    .feat  { fill: var(--svg-text,#e6edf3); font-family: monospace; font-size:12px; }
    .be-t  { fill: var(--svg-blue,#58a6ff); font-family: monospace; font-size:12px; font-weight:700; text-anchor:middle; }
    .be-s  { fill: var(--svg-text2,#8b949e); font-family: monospace; font-size:11px; text-anchor:middle; }
    .db-t  { fill: var(--svg-green,#3fb950); font-family: monospace; font-size:12px; font-weight:700; text-anchor:middle; }
    .lbl   { fill: var(--svg-text2,#8b949e); font-family: monospace; font-size:11px; letter-spacing:1px; text-transform:uppercase; }
    .arr   { fill: var(--svg-accent,#f0a500); opacity:.7; }
    .arr-b { fill: var(--svg-blue,#58a6ff); opacity:.6; }
  </style>
  <defs>
    <marker id="aM" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5z" class="arr"/></marker>
    <marker id="aMb" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5z" class="arr-b"/></marker>
  </defs>

  <rect class="bg" width="680" height="420"/>

  <!-- Monolith application box: x=10, y=30, w=300, h=360 -->
  <rect class="mono" x="10" y="30" width="300" height="360" rx="10"/>
  <text class="tit" x="160" y="54">MONOLITH APPLICATION</text>
  <text class="sub" x="160" y="70">Internet Banking — Single Deployable</text>

  <!-- Feature list — each line 24px pitch starting y=92 -->
  <text class="feat" x="26" y="96">1. Saving Account Details</text>
  <text class="feat" x="26" y="120">2. Current Account Details</text>
  <text class="feat" x="26" y="144">3. Fixed Deposit Accounts</text>
  <text class="feat" x="26" y="168">4. Recurring Deposit Accounts</text>
  <text class="feat" x="26" y="192">5. Demat Details</text>
  <text class="feat" x="26" y="216">6. Loans</text>
  <text class="feat" x="26" y="240">7. Card Management</text>
  <text class="feat" x="26" y="264">8. Online Payments (UPI)</text>
  <text class="feat" x="26" y="288">9. KYC</text>
  <text class="feat" x="26" y="312">10. FAQ</text>

  <!-- Single shared DB -->
  <rect class="db" x="50" y="342" width="220" height="36" rx="5"/>
  <text class="db-t" x="160" y="365">Single Shared Database</text>

  <!-- Backend systems — right side, boxes 166×44, pitch 56 -->
  <!-- Core Banking -->
  <rect class="be" x="490" y="30" width="174" height="44" rx="5"/>
  <text class="be-t" x="577" y="51">Core Banking</text>
  <text class="be-s" x="577" y="65">Accts 1–4</text>

  <!-- Securities Trading -->
  <rect class="be" x="490" y="88" width="174" height="44" rx="5"/>
  <text class="be-t" x="577" y="109">Securities Trading</text>
  <text class="be-s" x="577" y="123">Demat</text>

  <!-- LMS -->
  <rect class="be" x="490" y="146" width="174" height="44" rx="5"/>
  <text class="be-t" x="577" y="167">Loan Mgmt (LMS)</text>
  <text class="be-s" x="577" y="181">Loans</text>

  <!-- Card Systems -->
  <rect class="be" x="490" y="204" width="174" height="44" rx="5"/>
  <text class="be-t" x="577" y="225">Card Systems</text>
  <text class="be-s" x="577" y="239">Credit &amp; Debit</text>

  <!-- CRM -->
  <rect class="be" x="490" y="262" width="174" height="44" rx="5"/>
  <text class="be-t" x="577" y="283">CRM</text>
  <text class="be-s" x="577" y="297">KYC</text>

  <!-- CMS -->
  <rect class="be" x="490" y="320" width="174" height="44" rx="5"/>
  <text class="be-t" x="577" y="341">CMS</text>
  <text class="be-s" x="577" y="355">FAQ</text>

  <!-- Connections: from monolith right edge (x=310) to backend left edge (x=490) -->
  <line class="conn" x1="310" y1="120" x2="490" y2="52"  marker-end="url(#aM)"/>
  <line class="conn" x1="310" y1="192" x2="490" y2="110" marker-end="url(#aM)"/>
  <line class="conn" x1="310" y1="216" x2="490" y2="168" marker-end="url(#aM)"/>
  <line class="conn" x1="310" y1="264" x2="490" y2="226" marker-end="url(#aM)"/>
  <line class="conn" x1="310" y1="288" x2="490" y2="284" marker-end="url(#aM)"/>
  <line class="conn" x1="310" y1="312" x2="490" y2="342" marker-end="url(#aM)"/>

  <!-- Label -->
  <text class="lbl" x="360" y="400">All features in one binary · One DB · One deployment</text>
</svg>
