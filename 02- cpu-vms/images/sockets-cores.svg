<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 240">
  <style>
    .mb{fill:var(--svg-fill2,rgba(99,179,237,.04));stroke:var(--svg-border,rgba(99,179,237,.25));stroke-width:1.2}
