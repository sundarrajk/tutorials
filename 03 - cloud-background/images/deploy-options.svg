<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 258">
  <style>
    .bg   { fill: var(--svg-bg, #0d1117); }
    .col  { fill: var(--svg-card, #161b22); }
    .ca   { stroke: var(--svg-blue, #58a6ff); stroke-width: 1.2; }
    .cb   { stroke: var(--svg-accent, #f0a500); stroke-width: 1.2; }
    .hdr  { fill: var(--svg-text, #e6edf3); font-family: monospace; font-size: 13px; font-weight: 700; text-anchor: middle; }
    .step { fill: var(--svg-text2, #8b949e); font-family: monospace; font-size: 12px; }
    .num  { font-family: monospace; font-size: 11px; font-weight: 700; text-anchor: middle; }
    .na   { fill: var(--svg-blue, #58a6ff); }
    .nb   { fill: var(--svg-accent, #f0a500); }
    .sba  { fill: rgba(88,166,255,0.10); stroke: var(--svg-blue, #58a6ff); stroke-width: 0.8; }
    .sbb  { fill: rgba(240,165,0,0.10); stroke: var(--svg-accent, #f0a500); stroke-width: 0.8; }
    .time { fill: var(--svg-accent, #f0a500); font-family: monospace; font-size: 12px; font-weight: 700; text-anchor: middle; }
  </style>

  <rect class="bg" width="620" height="258"/>

  <!-- Column A -->
  <rect class="col ca" x="10"  y="10" width="290" height="238" rx="8"/>
  <text class="hdr na" x="155" y="34">Option A — Spare Capacity</text>

  <!-- Column B -->
  <rect class="col cb" x="320" y="10" width="290" height="238" rx="8"/>
  <text class="hdr nb" x="465" y="34">Option B — New Server</text>

  <!-- Option A steps — row height 28, starting y=48, pitch=30 -->
  <rect class="sba" x="22" y="44"  width="266" height="26" rx="3"/>
  <text class="num na" x="36" y="61">1</text>
  <text class="step"   x="50" y="61">Login to app-server admin console</text>

  <rect class="sba" x="22" y="76"  width="266" height="26" rx="3"/>
  <text class="num na" x="36" y="93">2</text>
  <text class="step"   x="50" y="93">Define new application instance</text>

  <rect class="sba" x="22" y="108" width="266" height="26" rx="3"/>
  <text class="num na" x="36" y="125">3</text>
  <text class="step"   x="50" y="125">Point to the application binary</text>

  <rect class="sba" x="22" y="140" width="266" height="26" rx="3"/>
  <text class="num na" x="36" y="157">4</text>
  <text class="step"   x="50" y="157">Configure (data sources, queues…)</text>

  <rect class="sba" x="22" y="172" width="266" height="26" rx="3"/>
  <text class="num na" x="36" y="189">5</text>
  <text class="step"   x="50" y="189">Start instance &amp; validate</text>

  <text class="time" x="155" y="232">~ Hours</text>

  <!-- Option B steps -->
  <rect class="sbb" x="332" y="44"  width="266" height="26" rx="3"/>
  <text class="num nb" x="346" y="61">1</text>
  <text class="step"   x="360" y="61">Identify a physical server</text>

  <rect class="sbb" x="332" y="76"  width="266" height="26" rx="3"/>
  <text class="num nb" x="346" y="93">2</text>
  <text class="step"   x="360" y="93">Install the Operating System</text>

  <rect class="sbb" x="332" y="108" width="266" height="26" rx="3"/>
  <text class="num nb" x="346" y="125">3</text>
  <text class="step"   x="360" y="125">Harden and secure the OS</text>

  <rect class="sbb" x="332" y="140" width="266" height="26" rx="3"/>
  <text class="num nb" x="346" y="157">4</text>
  <text class="step"   x="360" y="157">Install App Server runtime</text>

  <rect class="sbb" x="332" y="172" width="266" height="26" rx="3"/>
  <text class="num nb" x="346" y="189">5</text>
  <text class="step"   x="360" y="189">Register with admin console</text>

  <text class="time" x="465" y="232">Then follow all Option A steps</text>
  <text class="time nb" x="465" y="248" font-size="11" fill-opacity=".7">→ Days to Weeks total</text>
</svg>
