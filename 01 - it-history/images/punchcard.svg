<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 140">
  <style>
    .card-bg { fill: var(--svg-card, #e8d5a8); stroke: var(--svg-orange, #c9a84c); stroke-width: 1.5; }
    .card-top { fill: var(--svg-accent, #5a8fc4); fill-opacity: .75; }
    .card-corner{ fill: var(--svg-orange, #c9a84c); fill-opacity: .45; }
    .row-lbl { fill: var(--svg-text2, #7a5c2a); font-family: monospace; font-size: 7px; }
    .hole { fill: var(--svg-text2, #8B4513); fill-opacity: .75; }
    .top-text { fill: white; font-family: monospace; font-size: 7px; letter-spacing: 2px; }
    .bot-text { fill: var(--svg-text2, #7a5c2a); font-family: monospace; font-size: 6px; letter-spacing: 3px; }
  </style>
  <defs>
    <linearGradient id="cardGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="var(--svg-card, #f5e6c8)"/>
      <stop offset="100%" stop-color="var(--svg-fill1, #e8d5a8)"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="284" height="124" rx="4" fill="url(#cardGrad2)" stroke="var(--svg-orange,#c9a84c)" stroke-width="1.5"/>
  <polygon points="8,8 38,8 8,30" class="card-corner"/>
  <rect x="8" y="8" width="284" height="14" rx="4" class="card-top"/>
  <text x="20" y="19" class="top-text">IBM 80-COLUMN PUNCH CARD</text>
  <!-- Row labels -->
  <text x="14" y="35"  class="row-lbl">12</text>
