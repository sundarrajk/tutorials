<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 260">
  <style>
    .cab    { fill:var(--svg-card,#1a2235); stroke:var(--svg-text2,#4a5a78); stroke-width:1.5; }
    .panel  { fill:var(--svg-fill1,rgba(99,179,237,.35)); }
    .scr-bg { fill:var(--svg-bg,#050e08); stroke:var(--svg-text2,#3a4a5a); stroke-width:1; }
    .scr-fr { fill:var(--svg-card,#1a2a3a); stroke:var(--svg-border,rgba(99,179,237,.3)); stroke-width:1; }
    .grn    { fill:#00cc44; }
    .sw     { fill:var(--svg-text2,#8090a8); }
    .sw-on  { fill:#63b3ed; }
    .btn-r  { fill:#c53030; stroke:#fc8181; stroke-width:.5; }
    .btn-g  { fill:#276749; stroke:#68d391; stroke-width:.5; }
    .btn-b  { fill:#2c5282; stroke:#63b3ed; stroke-width:.5; }
    .btn-t  { fill:#ffffff; font-family:sans-serif; font-size:5.5px; }
    .tape-h { fill:var(--svg-bg,#050e0d); stroke:var(--svg-text2,#4a6080); stroke-width:1.5; }
    .reel   { fill:var(--svg-card,#1a2a30); stroke:var(--svg-text2,#4a6080); }
    .hub    { fill:var(--svg-text2,#5a7090); }
    .lbl    { fill:var(--svg-text2,#8096b8); font-family:'Space Mono',monospace,sans-serif; font-size:10px; font-weight:700; letter-spacing:3px; }
    .txt    { fill:#00cc44; fill-opacity:.88; font-family:monospace; font-size:7.5px; }
    .shad   { fill:rgba(0,0,0,0.22); }
    .punch-bg  { fill:var(--svg-card,#d4c080); stroke:var(--svg-amber,#b8952a); stroke-width:1.2; }
    .punch-top { fill:var(--svg-blue,#3060a0); fill-opacity:.7; }
    .punch-cor { fill:var(--svg-amber,#b8952a); fill-opacity:.4; }
    .punch-row { fill:var(--svg-text2,#6a5020); font-family:monospace; font-size:7px; }
    .hole      { fill:var(--svg-text2,#5a3a10); fill-opacity:.75; }
    .punch-bot { fill:var(--svg-text2,#6a5020); font-family:monospace; font-size:6px; letter-spacing:3px; }
  </style>

  <!-- Shadow -->
  <ellipse cx="175" cy="254" rx="140" ry="7" class="shad"/>

  <!-- ─── MAINFRAME CABINET ─── -->
  <rect x="20" y="28" width="310" height="220" rx="7" class="cab"/>
  <!-- Side panels -->
  <rect x="20" y="28" width="14" height="220" rx="3" class="panel" fill-opacity=".55"/>
  <rect x="316" y="28" width="14" height="220" rx="3" class="panel" fill-opacity=".55"/>
  <!-- Top trim -->
  <rect x="20" y="28" width="310" height="10" rx="4" fill="var(--svg-text2,#5a6a80)" fill-opacity=".45"/>
  <!-- Bottom trim -->
  <rect x="20" y="234" width="310" height="14" rx="4" fill="var(--svg-text2,#3a4a60)" fill-opacity=".5"/>

  <!-- ─── MAIN SCREEN ─── -->
  <rect x="38" y="44"  width="162" height="104" rx="5" class="scr-fr"/>
  <rect x="42" y="48"  width="154" height="96"  rx="4" class="scr-bg"/>
  <!-- CRT scanlines (subtle) -->
  <line x1="42" y1="54" x2="196" y2="54" stroke="#00cc44" stroke-opacity=".04" stroke-width="2"/>
  <line x1="42" y1="60" x2="196" y2="60" stroke="#00cc44" stroke-opacity=".04" stroke-width="2"/>
  <line x1="42" y1="66" x2="196" y2="66" stroke="#00cc44" stroke-opacity=".04" stroke-width="2"/>
  <!-- Screen text -->
  <text x="48" y="62"  class="txt">IBM SYSTEM/360  MODEL 67</text>
  <text x="48" y="72"  class="txt" fill-opacity=".7">OS/360  REL 21.8  IPL 0000</text>
  <text x="48" y="82"  class="txt" fill-opacity=".7">IEA000I SYSTEM INITIALISED</text>
  <text x="48" y="92"  class="txt" fill-opacity=".5">JES2 SUBSYSTEM ACTIVE</text>
  <text x="48" y="102" class="txt" fill-opacity=".5">BATCH QUEUE: 24 JOBS PENDING</text>
  <text x="48" y="112" class="txt" fill-opacity=".4">CPU: 0001  UTIL: 87%  MEM: 2MB</text>
  <text x="48" y="122" class="txt" fill-opacity=".4">NEXT JOB: PAYROLL-EOD  ETA 03:14</text>
  <text x="48" y="135" class="txt" fill-opacity=".9">▌</text>

  <!-- ─── CONTROL PANEL ─── -->
  <rect x="210" y="44" width="106" height="104" rx="5" class="scr-fr"/>
  <!-- Toggle switches row 1 -->
  <rect x="218" y="54" width="9" height="5" rx="1" class="sw"/>
  <rect x="230" y="54" width="9" height="5" rx="1" class="sw-on"/>
  <rect x="242" y="54" width="9" height="5" rx="1" class="sw"/>
  <rect x="254" y="54" width="9" height="5" rx="1" class="sw-on"/>
  <rect x="266" y="54" width="9" height="5" rx="1" class="sw"/>
  <rect x="278" y="54" width="9" height="5" rx="1" class="sw-on"/>
  <rect x="290" y="54" width="9" height="5" rx="1" class="sw"/>
  <rect x="302" y="54" width="9" height="5" rx="1" class="sw"/>
  <!-- Toggle switches row 2 -->
  <rect x="218" y="64" width="9" height="5" rx="1" class="sw-on"/>
  <rect x="230" y="64" width="9" height="5" rx="1" class="sw"/>
  <rect x="242" y="64" width="9" height="5" rx="1" class="sw-on"/>
  <rect x="254" y="64" width="9" height="5" rx="1" class="sw"/>
  <rect x="266" y="64" width="9" height="5" rx="1" class="sw"/>
  <rect x="278" y="64" width="9" height="5" rx="1" class="sw-on"/>
  <rect x="290" y="64" width="9" height="5" rx="1" class="sw-on"/>
  <rect x="302" y="64" width="9" height="5" rx="1" class="sw"/>
  <!-- Indicator lights -->
  <circle cx="222" cy="78" r="3.5" fill="#e53e3e" fill-opacity=".9"/>
  <circle cx="234" cy="78" r="3.5" fill="#d69e2e" fill-opacity=".9"/>
  <circle cx="246" cy="78" r="3.5" class="grn" fill-opacity=".95"/>
  <circle cx="258" cy="78" r="3.5" class="grn" fill-opacity=".75"/>
  <circle cx="270" cy="78" r="3.5" class="grn" fill-opacity=".55"/>
  <circle cx="282" cy="78" r="3.5" class="grn" fill-opacity=".9"/>
  <circle cx="294" cy="78" r="3.5" fill="#d69e2e" fill-opacity=".5"/>
  <circle cx="306" cy="78" r="3.5" class="grn" fill-opacity=".8"/>
  <!-- 2nd row lights -->
  <circle cx="222" cy="88" r="3.5" class="grn" fill-opacity=".85"/>
  <circle cx="234" cy="88" r="3.5" class="grn" fill-opacity=".6"/>
  <circle cx="246" cy="88" r="3.5" fill="#d69e2e" fill-opacity=".45"/>
  <circle cx="258" cy="88" r="3.5" class="grn" fill-opacity=".7"/>
  <circle cx="270" cy="88" r="3.5" fill="#e53e3e" fill-opacity=".35"/>
  <circle cx="282" cy="88" r="3.5" class="grn" fill-opacity=".9"/>
  <circle cx="294" cy="88" r="3.5" class="grn" fill-opacity=".5"/>
  <circle cx="306" cy="88" r="3.5" class="grn" fill-opacity=".75"/>
  <!-- Action buttons -->
  <rect x="218" y="100" width="22" height="12" rx="3" class="btn-r"/>
  <rect x="244" y="100" width="22" height="12" rx="3" class="btn-g"/>
  <rect x="270" y="100" width="22" height="12" rx="3" class="btn-b"/>
  <rect x="296" y="100" width="18" height="12" rx="3" fill="var(--svg-amber,#a0701a)" stroke="var(--svg-amber,#d4a830)" stroke-width=".5"/>
  <text x="229" y="109" class="btn-t" text-anchor="middle">STOP</text>
  <text x="255" y="109" class="btn-t" text-anchor="middle">START</text>
  <text x="281" y="109" class="btn-t" text-anchor="middle">RESET</text>
  <text x="305" y="109" class="btn-t" text-anchor="middle">IPL</text>
  <!-- Hex display -->
  <rect x="218" y="120" width="96" height="18" rx="3" fill="var(--svg-bg,#030808)"/>
  <text x="264" y="132" fill="#00cc44" fill-opacity=".8" font-family="monospace" font-size="9" text-anchor="middle">0C08  A34F  FF12</text>

  <!-- ─── TAPE DRIVES ─── -->
  <rect x="38" y="156" width="130" height="60" rx="5" class="scr-fr"/>
  <circle cx="74"  cy="184" r="18" class="tape-h"/>
  <circle cx="74"  cy="184" r="11" class="reel"/>
  <circle cx="74"  cy="184" r="4"  class="hub"/>
  <circle cx="74"  cy="184" r="1.5" fill="var(--svg-blue,#63b3ed)" fill-opacity=".6"/>
  <circle cx="126" cy="184" r="18" class="tape-h"/>
  <circle cx="126" cy="184" r="11" class="reel"/>
  <circle cx="126" cy="184" r="4"  class="hub"/>
  <circle cx="126" cy="184" r="1.5" fill="var(--svg-blue,#63b3ed)" fill-opacity=".6"/>
  <!-- tape between reels -->
  <line x1="85" y1="178" x2="115" y2="178" stroke="var(--svg-text2,#6a8090)" stroke-width="3" opacity=".6"/>

  <!-- ─── DISK DRIVES ─── -->
  <rect x="178" y="156" width="150" height="60" rx="5" class="scr-fr"/>
  <rect x="186" y="164" width="34" height="34" rx="4" class="tape-h"/>
  <circle cx="203" cy="181" r="12" class="reel"/>
  <circle cx="203" cy="181" r="4.5" class="hub"/>
  <rect x="228" y="164" width="34" height="34" rx="4" class="tape-h"/>
  <circle cx="245" cy="181" r="12" class="reel"/>
  <circle cx="245" cy="181" r="4.5" class="hub"/>
  <rect x="270" y="164" width="34" height="34" rx="4" class="tape-h"/>
  <circle cx="287" cy="181" r="12" class="reel"/>
  <circle cx="287" cy="181" r="4.5" class="hub"/>
  <!-- access lights -->
  <circle cx="196" cy="166" r="2" fill="#00cc44" fill-opacity=".8"/>
  <circle cx="238" cy="166" r="2" fill="#00cc44" fill-opacity=".5"/>
  <circle cx="280" cy="166" r="2" fill="#e53e3e" fill-opacity=".6"/>

  <!-- ─── LABEL ─── -->
  <text x="175" y="20" class="lbl" text-anchor="middle">MAINFRAME</text>

  <!-- ─── PUNCH CARD (bottom right) ─── -->
  <rect x="340" y="60" width="112" height="52" rx="3" class="punch-bg"/>
  <polygon points="340,60 360,60 340,76" class="punch-cor"/>
  <rect x="340" y="60" width="112" height="10" rx="2" class="punch-top"/>
  <text x="350" y="68" fill="white" font-family="monospace" font-size="6" letter-spacing="1.5">IBM 80-COL PUNCH CARD</text>
  <!-- Row labels -->
  <text x="344" y="81" class="punch-row">12</text>
  <text x="344" y="88" class="punch-row">11</text>
  <text x="344" y="95" class="punch-row">0 </text>
  <text x="344" y="103" class="punch-row">1 </text>
  <!-- Holes -->
  <rect x="354" y="76" width="3.5" height="6" rx="1" class="hole"/>
  <rect x="360" y="83" width="3.5" height="6" rx="1" class="hole"/>
  <rect x="366" y="76" width="3.5" height="6" rx="1" class="hole"/>
  <rect x="372" y="90" width="3.5" height="6" rx="1" class="hole"/>
  <rect x="378" y="76" width="3.5" height="6" rx="1" class="hole"/>
  <rect x="384" y="83" width="3.5" height="6" rx="1" class="hole"/>
  <rect x="390" y="76" width="3.5" height="6" rx="1" class="hole"/>
  <rect x="396" y="90" width="3.5" height="6" rx="1" class="hole"/>
  <rect x="402" y="83" width="3.5" height="6" rx="1" class="hole"/>
  <rect x="408" y="76" width="3.5" height="6" rx="1" class="hole"/>
  <rect x="414" y="90" width="3.5" height="6" rx="1" class="hole"/>
  <rect x="420" y="76" width="3.5" height="6" rx="1" class="hole"/>
  <rect x="426" y="83" width="3.5" height="6" rx="1" class="hole"/>
  <rect x="432" y="76" width="3.5" height="6" rx="1" class="hole"/>
  <rect x="438" y="90" width="3.5" height="6" rx="1" class="hole"/>
  <text x="396" y="108" class="punch-bot" text-anchor="middle">DO NOT FOLD · SPINDLE · OR MUTILATE</text>

  <!-- ─── CAPTION ─── -->
  <text x="396" y="135" fill="var(--svg-text2,rgba(99,179,237,.5))" font-family="monospace" font-size="8" text-anchor="middle">IBM System/360 (1964)</text>
  <text x="396" y="147" fill="var(--svg-text2,rgba(99,179,237,.4))" font-family="monospace" font-size="7.5" text-anchor="middle">Room-sized · Shared by whole org</text>
  <text x="396" y="158" fill="var(--svg-text2,rgba(99,179,237,.4))" font-family="monospace" font-size="7.5" text-anchor="middle">Batch jobs · No interactivity</text>
  <text x="396" y="170" fill="var(--svg-amber,rgba(246,173,85,.55))" font-family="monospace" font-size="7.5" text-anchor="middle">Cost: $3–8 million (1960s)</text>
</svg>
